<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Social links profile</title>

    <style>
      /* =========================================
         1. GLOBAL THINGS
         ========================================= */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: hsl(0, 0%, 8%);
        color: #fff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        gap: 30px;
      }

      /* =========================================
         2. MAIN CARD CONTAINER
         ========================================= */
      .profile-card {
        width: 100%;
        max-width: 420px;
        background: hsl(0, 0%, 12%);
        padding: 40px;
        border-radius: 15px;

        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      /* Profile Image */
      .profile-card img {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        margin-bottom: 25px;
      }

      /* =========================================
         3. TYPOGRAPHY
         ========================================= */
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .location {
        color: hsl(75, 94%, 57%);
        font-size: 0.9rem;
        font-weight: 600;
        margin-bottom: 25px;
      }

      .bio {
        font-size: 0.9rem;
        color: hsl(0, 0%, 80%);
        margin-bottom: 25px;
      }

      /* =========================================
         4. SOCIAL LINKS (Buttons)
         ========================================= */
      .social-list {
        width: 100%;
        display: flex;
        flex-direction: column;
        list-style-type: none;
        gap: 15px;
      }

      .social-btn {
        display: block;
        padding: 15px;
        background: hsl(0, 0%, 20%);
        color: white;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
        transition:
          background-color 0.2s ease,
          color 0.2s ease;
      }

      .social-btn:hover {
        background: hsl(75, 94%, 57%);
        color: hsl(0, 0%, 8%);
      }

      /* =========================================
         5. ATTRIBUTION / FOOTER
         ========================================= */
      .attribution {
        font-size: 11px;
        color: hsl(0, 0%, 60%);
        text-align: center;
      }

      .attribution a {
        color: hsl(75, 94%, 57%);
        text-decoration: none;
      }

      /* =========================================
         6. MEDIA QUERIES (Responsiveness)
         ========================================= */
      @media (max-width: 500px) {
        .profile-card {
          padding: 25px;
        }
      }
    </style>
  </head>
  <body>
    <main class="profile-card">
      <img src="./assets/images/avatar-jessica.jpeg" alt="Jessica Randall" />

      <h1>Jessica Randall</h1>
      <h3 class="location">London, United Kingdom</h3>
      <p class="bio">"Front-end developer and avid reader."</p>

      <ul class="social-list">
        <li><a class="social-btn" href="#">GitHub</a></li>
        <li><a class="social-btn" href="#">Frontend Mentor</a></li>
        <li><a class="social-btn" href="#">LinkedIn</a></li>
        <li><a class="social-btn" href="#">Twitter</a></li>
        <li><a class="social-btn" href="#">Instagram</a></li>
      </ul>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="https://github.com/AdamDruszad">AdamDruszad</a>.
    </footer>
  </body>
</html>
